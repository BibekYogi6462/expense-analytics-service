spring.application.name=financeTracker

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3308/expenseanalyticsservice

spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.datasource.username=root

spring.datasource.password=bibek

spring.jpa.show-sql=true

server.servlet.context-path=/api/v1.0

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.jpa.properties.hibernate.format_sql=true



# Email Configuration
spring.mail.host=smtp-relay.sendinblue.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.from=${BREVO_EMAIL}
spring.mail.properties.mail.debug=true


jwt.secret=${JWT_SECRET}
